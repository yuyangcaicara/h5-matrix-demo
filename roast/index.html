<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>30s 模拟朋友圈广告</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    body { background: #0e0e0e; }

    /* Cover */
    .cover-emoji { font-size: 56px; margin-bottom: 20px; }
    .cover-examples {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      justify-content: center;
    }
    .cover-examples .mini-card {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .cover-hook {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-top: 16px;
      padding: 8px 20px;
      background: rgba(74,222,128,0.06);
      border: 1px solid rgba(74,222,128,0.12);
      border-radius: 20px;
    }

    /* Selection screens shared */
    .sel-area {
      width: 100%;
      max-width: 340px;
    }

    .sel-title {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
    }

    .sel-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.35);
      text-align: center;
      margin-bottom: 28px;
    }

    .sel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sel-card {
      padding: 20px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .sel-card:active { transform: scale(0.97); }

    .sel-card.picked {
      border-color: rgba(74,222,128,0.5);
      background: rgba(74,222,128,0.08);
    }

    .sel-card .sel-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .sel-card .sel-label {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    /* Goal list */
    .sel-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sel-list-item {
      padding: 18px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-tap-highlight-color: transparent;
    }

    .sel-list-item:active { transform: scale(0.98); }

    .sel-list-item.picked {
      border-color: rgba(74,222,128,0.5);
      background: rgba(74,222,128,0.08);
    }

    .sel-list-item .sel-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    /* Name input screen */
    .name-area {
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    .name-input {
      width: 100%;
      padding: 18px 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    .name-input::placeholder {
      color: rgba(255,255,255,0.2);
      font-weight: 400;
    }

    .name-input:focus {
      border-color: rgba(74,222,128,0.5);
    }

    .name-hint {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      margin-bottom: 28px;
    }

    .name-skip {
      display: block;
      margin: 12px auto 0;
      background: none;
      border: none;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      cursor: pointer;
      padding: 8px;
    }

    /* Photo upload area */
    .photo-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .photo-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .photo-item {
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-item .photo-del {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
      cursor: pointer;
      border: none;
      line-height: 1;
    }

    .photo-add {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1.5px dashed rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .photo-add:active {
      border-color: rgba(74,222,128,0.5);
    }

    .photo-add-icon {
      font-size: 24px;
      color: rgba(255,255,255,0.2);
    }

    .photo-add-text {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
    }

    .photo-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      margin-top: 8px;
    }

    /* Simulated moments card */
    .moments-wrapper {
      width: 100%;
      max-width: 340px;
    }

    .sim-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: rgba(250,204,21,0.12);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(250,204,21,0.8);
      margin-bottom: 20px;
    }

    .moments-card {
      width: 100%;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      color: #111;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .mc-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 16px 16px 0;
    }

    .mc-avatar {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .mc-name {
      font-size: 15px;
      font-weight: 700;
      color: #576b95;
      margin-bottom: 4px;
    }

    .mc-text {
      font-size: 15px;
      line-height: 1.6;
      color: #111;
    }

    /* Image mode tabs */
    .mc-tabs {
      display: flex;
      margin-top: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 3px;
    }

    .mc-tab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
      -webkit-tap-highlight-color: transparent;
    }

    .mc-tab.active {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    /* Single image */
    .mc-image {
      width: 100%;
      aspect-ratio: 16/9;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #999;
      position: relative;
      overflow: hidden;
    }

    .mc-image-bg {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .mc-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .nine-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mc-image-icon {
      font-size: 48px;
    }

    .mc-image-text {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* Nine-grid */
    .mc-nine-grid {
      display: none;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 3px;
      margin: 8px 16px 0;
    }

    .mc-nine-grid.show {
      display: grid;
    }

    .mc-image.hide {
      display: none;
    }

    .nine-cell {
      aspect-ratio: 1;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      overflow: hidden;
    }

    .nine-cell-icon {
      font-size: 24px;
    }

    .nine-cell-text {
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
      text-align: center;
      padding: 0 4px;
    }

    .mc-footer {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mc-ad-tag {
      font-size: 11px;
      color: #999;
      padding: 2px 6px;
      border: 1px solid #ddd;
      border-radius: 3px;
    }

    .mc-time {
      font-size: 12px;
      color: #b2b2b2;
    }

    /* Social interactions (likes + comments) */
    .mc-social {
      margin: 0 12px 12px;
      background: #f7f7f7;
      border-radius: 6px;
      overflow: hidden;
    }

    .mc-likes {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      font-size: 13px;
      color: #576b95;
      border-bottom: 0.5px solid #eaeaea;
      flex-wrap: wrap;
      line-height: 1.6;
    }

    .mc-likes-icon {
      font-size: 12px;
      color: #576b95;
      flex-shrink: 0;
    }

    .mc-like-name {
      font-weight: 600;
      font-size: 13px;
    }

    .mc-like-comma {
      margin: 0 -2px;
    }

    .mc-comments {
      padding: 6px 10px;
    }

    .mc-comment {
      padding: 3px 0;
      font-size: 13px;
      line-height: 1.5;
      color: #111;
    }

    .mc-comment-name {
      color: #576b95;
      font-weight: 600;
    }

    .mc-comment-reply {
      color: #576b95;
      font-weight: 600;
    }

    .mc-comment-sep {
      color: #999;
      margin: 0 2px;
    }

    /* Actions */
    .sim-actions {
      width: 100%;
      max-width: 340px;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Step indicator */
    .step-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .step-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      transition: all 0.3s;
    }

    .step-dot.active {
      width: 20px;
      border-radius: 3px;
      background: #4ADE80;
    }

    .step-dot.done {
      background: rgba(74,222,128,0.4);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
      cursor: pointer;
      padding: 6px 0;
      margin-bottom: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:active { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>

  <!-- Screen 1: Cover -->
  <div class="screen active" id="s1">
    <div class="cover-emoji">📱</div>
    <div class="tag tag-green mb-16">互动体验 · 朋友圈广告模拟器</div>

    <div class="cover-hook">📊 内含腾讯广告行业数据</div>
  </div>

      <div class="sel-list" id="goalList">

  <!-- Screen 4: Enter name -->
  <div class="screen" id="s4">
    <div class="name-area">
      <button class="back-btn" onclick="goBack(3)">← 上一页</button>
      <div class="step-dots">
        <div class="step-dot done"></div>
        <div class="step-dot done"></div>

      </div>
      <div class="sel-title">给你的广告起个名</div>

      <div class="photo-section">

        <div class="photo-hint">不上传则使用模板效果</div>
      </div>

      <button class="btn-primary" style="margin-top:24px;" onclick="generateAd()">生成我的广告</button>
      <button class="name-skip" onclick="generateAd()">跳过，用默认效果</button>
    </div>
  </div>

  <!-- Screen 5: Simulated ad -->
  <div class="screen" id="s5">
    <div class="moments-wrapper">
      <div class="sim-badge">⚠️ 效果模拟 · 仅供参考</div>

      <div class="moments-card" id="momentsCard">
        <div class="mc-header">
          <div class="mc-avatar" id="mcAvatar"></div>
          <div>

        <div class="mc-image" id="mcImage">

        <div class="mc-footer">

          <span class="mc-time">刚刚</span>
        </div>
        <div class="mc-social" id="mcSocial" style="display:none;"></div>
      </div>

      <div class="mc-tabs">
        <button class="mc-tab active" onclick="switchTab('single')">单图模式</button>
        <button class="mc-tab" onclick="switchTab('nine')">九宫格模式</button>
      </div>
    </div>

    <div class="sim-actions">

      <button class="share-btn" onclick="handleShare()">发给朋友看看我的广告 →</button>

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function generateSocial(industry) {
      const names = shuffle(fakeNames);
      let html = '';

      // Likes (3-6 people)
      const likeCount = 3 + Math.floor(Math.random() * 4);
      const likeNames = names.splice(0, likeCount);
      html += '<div class="mc-likes"><span class="mc-likes-icon">❤️</span>';
      html += likeNames.map(n => `<span class="mc-like-name">${n}</span>`).join('<span class="mc-like-comma">，</span>');
      html += '</div>';

      // Comments (2-3)
      const commentCount = 2 + Math.floor(Math.random() * 2);
      const pool = shuffle(fakeComments[industry] || fakeComments.other);
      const selected = pool.slice(0, commentCount);
      const commentNames = names.splice(0, commentCount + 1); // extra for reply target

      html += '<div class="mc-comments">';
      selected.forEach((c, i) => {
        if (c.type === 'reply' && i > 0) {
          html += `<div class="mc-comment"><span class="mc-comment-name">${commentNames[i]}</span><span class="mc-comment-sep">回复</span><span class="mc-comment-reply">${commentNames[commentCount]}</span>：${c.text}</div>`;
        } else {
          html += `<div class="mc-comment"><span class="mc-comment-name">${commentNames[i]}</span>：${c.text}</div>`;
        }
      });
      html += '</div>';

      return html;
    }

    // === Init ===
    function init() {
      // Render industry grid

          <div class="sel-icon">${ind.icon}</div>
          <div class="sel-label">${ind.label}</div>

      `).join('');

      // Render goal list
      const list = document.getElementById('goalList');
      list.innerHTML = goals.map(g => `
        <div class="sel-list-item" onclick="pickGoal('${g.key}', this)">
          <div class="sel-icon">${g.icon}</div>

        </div>
      `).join('');

      // Photo upload handler
      document.getElementById('photoInput').addEventListener('change', handlePhotoUpload);
    }

    // === Photo Upload ===
    function handlePhotoUpload(e) {
      const files = Array.from(e.target.files);
      const remaining = 9 - uploadedPhotos.length;
      const toAdd = files.slice(0, remaining);

      toAdd.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          uploadedPhotos.push(ev.target.result);
          renderPhotoGrid();
        };
        reader.readAsDataURL(file);
      });

      // reset input so same file can be re-selected
      e.target.value = '';
    }

    function removePhoto(idx) {
      uploadedPhotos.splice(idx, 1);
      renderPhotoGrid();
    }

    function renderPhotoGrid() {
      const grid = document.getElementById('photoGrid');
      let html = '';

      // Render uploaded photos
      uploadedPhotos.forEach((src, i) => {
        html += `
          <div class="photo-item">
            <img src="${src}">
            <button class="photo-del" onclick="removePhoto(${i})">&times;</button>
          </div>`;
      });

      // Add button (if < 9)
      if (uploadedPhotos.length < 9) {
        html += `
          <label class="photo-add" id="photoAddBtn">
            <input type="file" accept="image/*" multiple hidden id="photoInput" onchange="handlePhotoUpload(event)">
            <div class="photo-add-icon">+</div>
            <div class="photo-add-text">${uploadedPhotos.length === 0 ? '添加照片' : uploadedPhotos.length + '/9'}</div>
          </label>`;
      }

      grid.innerHTML = html;
    }

      if (pickedIndustry) return;
      pickedIndustry = key;
      el.classList.add('picked');

      document.querySelectorAll('#indGrid .sel-card').forEach(c => c.style.pointerEvents = 'none');

      const tpl = adTemplates[key];

      setTimeout(() => goTo(4), 400);

    function generateAd() {
      const nameVal = document.getElementById('nameInput').value.trim();
      const tpl = adTemplates[pickedIndustry];
      const shopName = nameVal || tpl.defaultName;
      const adText = tpl.texts[pickedGoal];

      // Fill card header

      document.getElementById('mcName').textContent = shopName;
      document.getElementById('mcText').textContent = adText;

      // === Single image area ===
      const mcImage = document.getElementById('mcImage');
      const mcImageBg = document.getElementById('mcImageBg');
      if (hasPhotos) {
        // Use first uploaded photo as single image
        mcImage.style.background = 'none';
        mcImageBg.innerHTML = `<img src="${uploadedPhotos[0]}" style="width:100%;height:100%;object-fit:cover;">`;
      } else {
        // Default: gradient + icon
        mcImage.style.background = `linear-gradient(135deg, ${tpl.imageColors[0]}, ${tpl.imageColors[1]})`;
        mcImageBg.innerHTML = `
          <div class="mc-image-icon">${tpl.imageIcon}</div>
          <div class="mc-image-text">${tpl.imageText}</div>`;
      }

      // === Nine grid area ===
      const nineGrid = document.getElementById('mcNineGrid');
      let cells = [];

      if (hasPhotos) {
        // User photos first
        uploadedPhotos.forEach(src => {
          cells.push(`<div class="nine-cell"><img src="${src}"></div>`);
        });
        // Fill remaining with template cells
        const remaining = 9 - uploadedPhotos.length;
        const templateCells = tpl.nineGrid.slice(0, remaining);
        templateCells.forEach(cell => {
          cells.push(`
            <div class="nine-cell" style="background:linear-gradient(135deg, ${tpl.imageColors[0]}, ${tpl.imageColors[1]})">
              <div class="nine-cell-icon">${cell.icon}</div>
              <div class="nine-cell-text">${cell.text}</div>
            </div>`);

      } else {

          cells.push(`
            <div class="nine-cell" style="background:linear-gradient(135deg, ${tpl.imageColors[0]}, ${tpl.imageColors[1]})">
              <div class="nine-cell-icon">${cell.icon}</div>
              <div class="nine-cell-text">${cell.text}</div>

    // === Tab switch ===
    function switchTab(mode) {
      const tabs = document.querySelectorAll('.mc-tab');
      const img = document.getElementById('mcImage');
      const nineGrid = document.getElementById('mcNineGrid');

      tabs.forEach(t => t.classList.remove('active'));

      if (mode === 'nine') {
        tabs[1].classList.add('active');
        img.style.display = 'none';
        nineGrid.classList.add('show');
      } else {
        tabs[0].classList.add('active');
        img.style.display = 'flex';
        nineGrid.classList.remove('show');
      }
    }

    // === Navigation ===
    function goTo(n) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

    async function handleShare() {
      const name = document.getElementById('mcName').textContent;
      const tpl = adTemplates[pickedIndustry];

      // Create share image using Canvas
      const canvas = document.createElement('canvas');
      canvas.width = 750;
      canvas.height = 1000;
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = '#0e0e0e';
      ctx.fillRect(0, 0, 750, 1000);

      // Title
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 36px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('我的朋友圈广告长这样', 375, 80);

      // Card area background
      ctx.fillStyle = '#fff';
      roundRect(ctx, 40, 120, 670, 520, 20);
      ctx.fill();

      // Avatar
      ctx.font = '40px serif';
      ctx.textAlign = 'center';
      ctx.fillText(tpl.avatar, 90, 185);

      // Shop name
      ctx.fillStyle = '#576b95';
      ctx.font = 'bold 28px -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(name, 130, 175);

      // Ad text
      ctx.fillStyle = '#333';
      ctx.font = '24px -apple-system, sans-serif';
      const adText = tpl.texts[pickedGoal];
      wrapText(ctx, adText, 130, 215, 550, 32);

      // Image placeholder with gradient
      const grad = ctx.createLinearGradient(60, 280, 690, 540);
      grad.addColorStop(0, tpl.imageColors[0]);
      grad.addColorStop(1, tpl.imageColors[1]);
      ctx.fillStyle = grad;
      roundRect(ctx, 60, 280, 630, 280, 10);
      ctx.fill();

      // Icon on image
      ctx.font = '60px serif';
      ctx.textAlign = 'center';
      ctx.fillText(tpl.imageIcon, 375, 420);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px -apple-system, sans-serif';
      ctx.fillText(tpl.imageText, 375, 460);

      // Ad tag
      ctx.fillStyle = '#999';
      ctx.font = '20px -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('广告', 60, 610);

      // Separator
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.beginPath();
      ctx.moveTo(40, 660);
      ctx.lineTo(710, 660);
      ctx.stroke();

      // Bottom: "来看看你的" text
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '24px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('你的广告出现在朋友圈会是什么样？', 375, 720);

      // QR code placeholder
      ctx.fillStyle = '#fff';
      roundRect(ctx, 275, 750, 200, 200, 12);
      ctx.fill();
      ctx.fillStyle = '#999';
      ctx.font = '18px -apple-system, sans-serif';
      ctx.fillText('长按识别体验', 375, 860);

      // Footer
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '18px -apple-system, sans-serif';
      ctx.fillText('30s 模拟朋友圈广告 · 内含行业数据', 375, 980);

      // Convert to blob and share
      canvas.toBlob(async (blob) => {
        if (navigator.share && navigator.canShare) {
          const file = new File([blob], 'my-ad.png', { type: 'image/png' });
          try {
            await navigator.share({
              title: '30s 模拟朋友圈广告',
              text: `看看「${name}」的广告出现在朋友圈是什么样！`,
              files: [file]
            });
          } catch(e) {
            downloadImage(blob);
          }
        } else {
          downloadImage(blob);
        }
      }, 'image/png');
    }

    function downloadImage(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'my-ad.png';
      a.click();
      URL.revokeObjectURL(url);
      alert('图片已保存，可以分享给朋友');
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      let line = '';
      for (let i = 0; i < text.length; i++) {
        const testLine = line + text[i];
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          line = text[i];
          y += lineHeight;
        } else {
          line = testLine;
        }
      }
      ctx.fillText(line, x, y);
    }
