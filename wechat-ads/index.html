<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>只有内行才知道的获客门道</title>
  <link rel="stylesheet" href="../shared.css">
  <style>
    body { background: #111; }

    /* Cover */
    .cover-icon { font-size: 56px; margin-bottom: 20px; }
    .cover-hook {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-top: 16px;
      padding: 8px 20px;
      background: rgba(74,222,128,0.06);
      border: 1px solid rgba(74,222,128,0.12);
      border-radius: 20px;
    }

    /* Quiz area */
    .quiz-wrap {
      width: 100%;
      max-width: 340px;
    }

    .q-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .q-num {
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }

    .q-question {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 24px;
      text-align: center;
    }

    .q-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .q-opt {
      padding: 16px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.5;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .q-opt:active { transform: scale(0.98); }
    .q-opt.disabled { pointer-events: none; }

    .q-opt.correct {
      border-color: rgba(74,222,128,0.6);
      background: rgba(74,222,128,0.1);
      color: #fff;
    }

    .q-opt.wrong {
      border-color: rgba(248,113,113,0.6);
      background: rgba(248,113,113,0.08);
      color: rgba(255,255,255,0.5);
    }

    .q-opt .q-mark {
      display: none;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
    }

    .q-opt.correct .q-mark,
    .q-opt.wrong .q-mark { display: block; }

    /* 老炮说 reveal */
    .reveal-box {
      margin-top: 20px;
      padding: 18px 20px;
      background: rgba(250,204,21,0.04);
      border: 1px solid rgba(250,204,21,0.12);
      border-radius: 16px;
      display: none;
      animation: fadeInUp 0.3s ease forwards;
    }

    .reveal-box.show { display: block; }

    .reveal-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(250,204,21,0.7);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .reveal-text {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255,255,255,0.75);
    }

    .q-next-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }

    .q-next-btn.show { display: block; }
    .q-next-btn:active { background: rgba(255,255,255,0.15); }

    /* Result */
    .result-card {
      width: 100%;
      max-width: 320px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 36px 24px;
      text-align: center;
    }

    .result-emoji { font-size: 56px; margin-bottom: 12px; }

    .result-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .result-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .result-score-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .result-score-fill {
      height: 100%;
      background: #4ADE80;
      border-radius: 4px;
      transition: width 1s ease;
    }

    .result-score-text {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 24px;
    }

    .result-summary {
      text-align: left;
      margin-bottom: 20px;
    }

    .result-summary-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
    }

    .ri-fact {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.7);
    }

    .ri-fact-icon {
      flex-shrink: 0;
      margin-top: 1px;
    }
  </style>
</head>
<body>

  <!-- Screen 1: Cover -->
  <div class="screen active" id="s1">
    <div class="cover-icon">📱</div>
    <div class="tag tag-green mb-16">老板必看 · 6 道题</div>
    <div class="title">只有内行才知道的<br>获客门道</div>
    <div class="subtitle">6 道题，看看你是不是被常识耽误了</div>
    <button class="btn-primary mt-8" onclick="startQuiz()">开始测试</button>
    <div class="cover-hook">📊 完成测试可领取你的行业获客数据</div>
  </div>

  <!-- Screen 2: Quiz -->
  <div class="screen" id="s2">
    <div class="quiz-wrap">
      <div class="q-progress">
        <div class="q-num" id="qNum">1 / 6</div>
        <div class="progress-bar" style="max-width:200px;">
          <div class="fill" id="qFill" style="width:0%"></div>
        </div>
      </div>
      <div class="q-question" id="qText"></div>
      <div class="q-options" id="qOpts"></div>
      <div class="reveal-box" id="revealBox">
        <div class="reveal-label">🔥 老炮说</div>
        <div class="reveal-text" id="revealText"></div>
      </div>
      <button class="q-next-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>

  <!-- Screen 3: Result -->
  <div class="screen" id="s3">
    <div class="result-card">
      <div class="result-emoji" id="rEmoji">🎓</div>
      <div class="result-title" id="rTitle"></div>
      <div class="result-sub" id="rSub"></div>
      <div class="result-score-bar">
        <div class="result-score-fill" id="rFill" style="width:0%"></div>
      </div>
      <div class="result-score-text" id="rScoreText"></div>
      <div class="result-summary" id="rSummary"></div>
    </div>
    <button class="btn-primary w-full mt-16" onclick="goTo(4)">免费获取行业获客数据</button>
    <button class="share-btn" onclick="handleShare()">发给也想获客的朋友 →</button>
  </div>

<!-- Screen 4: CTA -->
<div class="screen" id="s4">
  <div style="width:100%;max-width:340px;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">📊</div>
    <div class="title" style="font-size:22px;">你的行业<br>平均获客成本是？</div>
    <div class="subtitle" style="margin-bottom:24px;">扫码了解你的行业数据<br>看看同行花多少钱获一个客户</div>
    <div class="qr-placeholder">企微二维码</div>
    <button class="btn-primary w-full mt-16">免费获取行业获客数据</button>
  </div>
</div>

  <script>
    const quizzes = [
      {
        question: '在微信投广告，最少要花多少钱？',
        options: [
          { text: '至少 1 万起步', correct: false },
          { text: '几十块就能开始', correct: true },
          { text: '要看行业，最少也得几千', correct: false }
        ],
        reveal: '没有起投门槛，几十块就能跑。很多小店老板第一次投 100 块试水，效果好了再加。别被"烧钱"两个字吓到。'
      },
      {
        question: '朋友圈广告，能指定给谁看吗？',
        options: [
          { text: '不能，系统随机投放', correct: false },
          { text: '只能选城市，不能更精准', correct: false },
          { text: '能按地区、年龄、兴趣等精准定向', correct: true }
        ],
        reveal: '"附近 3 公里的 25-40 岁女性"都能精准投。本地商家一定要用地域定向，半径越小越精准，别把钱撒给不相关的人。'
      },
      {
        question: '没有设计师，能投广告吗？',
        options: [
          { text: '不行，必须有专业素材', correct: false },
          { text: '可以，有工具能自动生成素材', correct: true },
          { text: '可以，但效果会很差', correct: false }
        ],
        reveal: '别花钱请设计了。有智能创意工具，选模板传产品图就行。而且手机拍的真实照片，反而比精修海报效果好，用户觉得真实。'
      },
      {
        question: '微信广告只能投朋友圈？',
        options: [
          { text: '对，只有朋友圈', correct: false },
          { text: '朋友圈、公众号、视频号、小程序都能投', correct: true }
        ],
        reveal: '朋友圈只是其中一个位置。公众号文章里、视频号信息流、小程序里都能放广告。视频号现在流量红利大，有短视频素材的优先试。'
      },
      {
        question: '广告投出去了，钱没花完能退吗？',
        options: [
          { text: '不能，投出去就是泼出去的水', correct: false },
          { text: '能退，随时能停，余额可退', correct: true }
        ],
        reveal: '随时能暂停投放，没花完的余额可以退。不存在"一投就停不下来"的事。预算你说了算，不是系统说了算。'
      },
      {
        question: '投微信广告需要专业团队吗？',
        options: [
          { text: '需要，至少得有个投手', correct: false },
          { text: '最好有，不然搞不定', correct: false },
          { text: '一个人就能搞定', correct: true }
        ],
        reveal: '现在有行业智投模式，选行业、传素材、设预算三步就搞定。很多老板都是自己一个人投，不需要专门雇人。把省下来的钱投广告不香吗？'
      }
    ];

    let currentQ = 0;
    let score = 0;
    let answered = false;

    function startQuiz() {
      currentQ = 0;
      score = 0;
      goTo(2);
      loadQuestion();
    }

    function loadQuestion() {
      answered = false;
      const q = quizzes[currentQ];
      document.getElementById('qNum').textContent = `${currentQ + 1} / ${quizzes.length}`;
      document.getElementById('qFill').style.width = `${(currentQ / quizzes.length) * 100}%`;
      document.getElementById('qText').textContent = q.question;

      // Reveal & next button hidden
      document.getElementById('revealBox').classList.remove('show');
      document.getElementById('nextBtn').classList.remove('show');

      // Render options
      const opts = document.getElementById('qOpts');
      opts.innerHTML = q.options.map((o, i) => `
        <div class="q-opt" onclick="pickAnswer(${i})">
          ${o.text}
          <span class="q-mark">${o.correct ? '✓' : '✗'}</span>
        </div>
      `).join('');
    }

    function pickAnswer(idx) {
      if (answered) return;
      answered = true;

      const q = quizzes[currentQ];
      const opts = document.querySelectorAll('.q-opt');

      // Mark all options
      q.options.forEach((o, i) => {
        opts[i].classList.add('disabled');
        if (o.correct) {
          opts[i].classList.add('correct');
        } else if (i === idx) {
          opts[i].classList.add('wrong');
        }
      });

      if (q.options[idx].correct) score++;

      // Show reveal
      document.getElementById('revealText').textContent = q.reveal;
      document.getElementById('revealBox').classList.add('show');

      // Show next button
      const btn = document.getElementById('nextBtn');
      btn.textContent = currentQ >= quizzes.length - 1 ? '看看结果' : '下一题 →';
      btn.classList.add('show');
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= quizzes.length) {
        showResult();
      } else {
        // Fade out and in
        const wrap = document.querySelector('.quiz-wrap');
        wrap.style.opacity = '0';
        wrap.style.transform = 'translateX(-15px)';
        setTimeout(() => {
          loadQuestion();
          wrap.style.opacity = '1';
          wrap.style.transform = 'translateX(0)';
        }, 200);
      }
    }

    function showResult() {
      const pct = Math.round((score / quizzes.length) * 100);
      let emoji, title, sub;

      if (score >= 5) {
        emoji = '🧠'; title = '投放老司机';
        sub = '你对微信广告的了解超过大多数人，可以直接上手了。';
      } else if (score >= 3) {
        emoji = '🤔'; title = '有点底子';
        sub = '知道一些，但还有几个关键认知需要纠正。了解一下行业数据会帮你少走弯路。';
      } else {
        emoji = '😯'; title = '被误解耽误了';
        sub = '很多人跟你一样，对投广告有不少误解。其实没那么难，也没那么贵。';
      }

      document.getElementById('rEmoji').textContent = emoji;
      document.getElementById('rTitle').textContent = title;
      document.getElementById('rSub').textContent = sub;
      document.getElementById('rScoreText').textContent = `答对 ${score}/${quizzes.length} 题`;

      // Summary: concise correct-answer facts
      const facts = [
        '几十块就能开始投，没有起投门槛',
        '能按地区、年龄、兴趣精准定向',
        '没有设计师也能投，有工具自动生成素材',
        '不止朋友圈，公众号、视频号、小程序都能投',
        '随时能停，余额可退，预算你说了算',
        '一个人就能搞定，有行业智投模式'
      ];
      const summary = document.getElementById('rSummary');
      summary.innerHTML = '<div class="result-summary-title">获客 6 个真相</div>' +
        facts.map(f => `
          <div class="ri-fact">
            <span class="ri-fact-icon">✅</span>
            <span>${f}</span>
          </div>
        `).join('');

      goTo(3);

      // Animate score bar
      setTimeout(() => {
        document.getElementById('rFill').style.width = pct + '%';
      }, 300);
    }

    function goTo(n) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('s' + n).classList.add('active');
    }

    function handleShare() {
      if (navigator.share) {
        navigator.share({
          title: '只有内行才知道的获客门道',
          text: `我答对了 ${score}/${quizzes.length} 题，你对投广告了解多少？`,
          url: location.href
        });
      } else {
        alert('长按截图分享给朋友');
      }
    }
  </script>
</body>
</html>
